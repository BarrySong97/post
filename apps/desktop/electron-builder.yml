appId: com.post.desktop
productName: Post
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: ../../packages/db/drizzle
    to: drizzle
  - from: ../../target/release/post-indexer
    to: post-indexer
  - from: resources/ffmpeg
    to: ffmpeg
    filter:
      - ffmpeg
      - ffmpeg.exe
      - LICENSE*
asarUnpack:
  - "**/*.node"
  - "node_modules/node-pty/**"
npmRebuild: true
mac:
  target:
    - dmg
win:
  target:
    - nsis
linux:
  target:
    - AppImage
