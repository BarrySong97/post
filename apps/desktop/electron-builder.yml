appId: com.post.desktop
productName: Post
protocols:
  - name: Post
    schemes:
      - post
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: resources/icons/Post-512.png
    to: icons/Post-512.png
  - from: ../../packages/db/drizzle
    to: drizzle
  - from: ../../target/release/post-indexer
    to: post-indexer
  - from: resources/ffmpeg
    to: ffmpeg
    filter:
      - ffmpeg
      - ffmpeg.exe
      - LICENSE*
  - from: ../extension/native-host/post-native-host.mjs
    to: native-host/post-native-host.mjs
asarUnpack:
  - "**/*.node"
  - "node_modules/node-pty/**"
npmRebuild: true
publish:
  provider: github
  owner: BarrySong97
  repo: post
  releaseType: release
mac:
  icon: resources/icons/Post.icns
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
win:
  icon: resources/icons/Post.ico
  target:
    - nsis
linux:
  icon: resources/icons/Post-512.png
  target:
    - AppImage
